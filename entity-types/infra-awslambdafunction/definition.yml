domain: INFRA
type: AWSLAMBDAFUNCTION

synthesis:
  rules:
  - identifier: entityId
    name: displayName
    encodeIdentifierInGUID: true
    conditions:
    - attribute: provider.name
      value: LambdaFunction
    tags:
      aws.accountId:
      aws.region:
      aws.arn:
      aws.functionName:
        entityTagNames: [functionName]
      aws.runtime:
        entityTagNames: [runtime]
      aws.memorySize:
        entityTagNames: [memorySize]
      aws.timeout:
        entityTagNames: [timeout]
      label.*:

configuration:
  entityExpirationTime: EIGHT_DAYS
  alertable: true
