domain: INFRA
type: AWSAPIGATEWAYAPI

synthesis:
  rules:
  - identifier: entityId
    name: displayName
    encodeIdentifierInGUID: true
    conditions:
    - attribute: provider.name
      value: ApiGatewayApi
    tags:
      aws.accountId:
      aws.region:
      aws.arn:
      aws.apiId:
        entityTagNames: [apiId]
      aws.apiName:
        entityTagNames: [apiName]
      aws.apiType:
        entityTagNames: [apiType]
      label.*:

configuration:
  entityExpirationTime: EIGHT_DAYS
  alertable: true
